# Nginx config for Telegram Inbox Bot admin panel.
# Install to: /etc/nginx/sites-available/admintextbot.hotzagor.tech.conf
# Symlink to: /etc/nginx/sites-enabled/admintextbot.hotzagor.tech.conf
# Issue the Let's Encrypt certificate before enabling this HTTPS config.

limit_req_zone $binary_remote_addr zone=telegram_inbox_login:10m rate=5r/m;

server {
    listen 80;
    listen [::]:80;
    server_name admintextbot.hotzagor.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admintextbot.hotzagor.tech;

    ssl_certificate /etc/letsencrypt/live/admintextbot.hotzagor.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admintextbot.hotzagor.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 5m;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; form-action 'self'; frame-ancestors 'none'; base-uri 'self'" always;

    # Optional layer 1 protection:
    # sudo apt install apache2-utils
    # sudo htpasswd -c /etc/nginx/.telegram-inbox-admin.htpasswd admin
    # auth_basic "Telegram Inbox Admin";
    # auth_basic_user_file /etc/nginx/.telegram-inbox-admin.htpasswd;

    # Optional IP allowlist:
    # allow YOUR_STATIC_ADMIN_IP;
    # deny all;

    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* ^/(?:\.env|\.git|\.hg|\.svn|__pycache__|alembic|backups|logs)(?:/|$) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /login {
        limit_req zone=telegram_inbox_login burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}
