name: Security Audit

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  dependency-and-code-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-security.txt

      - name: Compile locked dependency set
        run: python -m piptools compile --quiet --output-file requirements.lock requirements.txt

      - name: Audit dependencies
        run: python -m pip_audit -r requirements.lock

      - name: Static security scan
        run: python -m bandit -r app
