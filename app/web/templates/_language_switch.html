<div class="language-switch {{ extra_class | default('') }}" aria-label="{{ t(request, 'language') }}">
  <a href="/language/uk?next={{ request.url.path | urlencode }}" class="{% if language == 'uk' %}active{% endif %}" {% if language == 'uk' %}aria-current="true"{% endif %}>UA</a>
  <a href="/language/en?next={{ request.url.path | urlencode }}" class="{% if language == 'en' %}active{% endif %}" {% if language == 'en' %}aria-current="true"{% endif %}>EN</a>
</div>
